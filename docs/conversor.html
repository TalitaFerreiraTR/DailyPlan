<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conversor JSON → DPBAK</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1f2937; color: #f9fafb; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111827; border: 1px solid #374151; border-radius: 12px; padding: 32px; max-width: 460px; width: 90%; text-align: center; }
        h2 { margin: 0 0 8px; font-size: 18px; color: #ff8000; }
        p { font-size: 13px; color: #9ca3af; margin: 0 0 24px; line-height: 1.5; }
        .drop-zone { border: 2px dashed #374151; border-radius: 8px; padding: 32px 16px; cursor: pointer; transition: 0.2s; margin-bottom: 16px; }
        .drop-zone:hover, .drop-zone.over { border-color: #ff8000; background: rgba(255,128,0,0.05); }
        .drop-zone span { font-size: 13px; color: #9ca3af; }
        input[type="file"] { display: none; }
        .status { font-size: 12px; min-height: 20px; margin-top: 12px; }
        .ok { color: #10b981; }
        .err { color: #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Conversor DailyPlan</h2>
        <p>Converte backup <strong>.json</strong> antigo para o novo formato <strong>.dpbak</strong> (codificado).<br>Tudo roda no seu computador, nenhum dado é enviado.</p>
        <div class="drop-zone" id="drop">
            <span>Clique aqui ou arraste o arquivo .json</span>
            <input type="file" id="fileIn" accept=".json,application/json">
        </div>
        <div class="status" id="status"></div>
    </div>
    <script>
        var drop = document.getElementById('drop');
        var fileIn = document.getElementById('fileIn');
        var status = document.getElementById('status');
        drop.addEventListener('click', function() { fileIn.click(); });
        drop.addEventListener('dragover', function(e) { e.preventDefault(); drop.classList.add('over'); });
        drop.addEventListener('dragleave', function() { drop.classList.remove('over'); });
        drop.addEventListener('drop', function(e) { e.preventDefault(); drop.classList.remove('over'); if (e.dataTransfer.files.length) convert(e.dataTransfer.files[0]); });
        fileIn.addEventListener('change', function() { if (this.files.length) convert(this.files[0]); });

        function convert(file) {
            status.className = 'status';
            status.textContent = 'Lendo arquivo...';
            var reader = new FileReader();
            reader.onload = function(e) {
                var raw = e.target.result;
                try { JSON.parse(raw); } catch (err) {
                    status.className = 'status err';
                    status.textContent = 'Erro: arquivo não é um JSON válido.';
                    return;
                }
                var encoded = btoa(unescape(encodeURIComponent(raw)));
                var name = file.name.replace(/\.json$/i, '') + '.dpbak';
                var blob = new Blob([encoded], { type: 'application/octet-stream' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
                status.className = 'status ok';
                status.textContent = 'Convertido! Arquivo "' + name + '" salvo. Agora importe no site.';
            };
            reader.onerror = function() {
                status.className = 'status err';
                status.textContent = 'Erro ao ler o arquivo.';
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
